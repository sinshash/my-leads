<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TDOT Group - National Field Services Coverage</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background:#f5f5f5; }

  #header {
    background:#fff; border-bottom:3px solid #CC2027;
    padding:8px 20px; display:flex; align-items:center;
    justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.08); gap:12px;
  }
  #header-left { display:flex; align-items:center; gap:14px; }
  #header-logo { height:48px; width:auto; }
  #header-title h1 { font-size:1.05rem; font-weight:700; color:#1B2A5A; line-height:1.2; }
  #header-title h1 span { color:#CC2027; }
  #header-title p { font-size:0.68rem; color:#999; margin-top:2px; text-transform:uppercase; letter-spacing:0.5px; }

  #search-wrap { position:relative; }
  #search-input {
    border:1.5px solid #ddd; border-radius:20px;
    padding:6px 14px 6px 34px; font-size:0.78rem;
    outline:none; width:210px; color:#1B2A5A; transition:border-color 0.2s;
  }
  #search-input:focus { border-color:#CC2027; }
  #search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:#aaa; font-size:13px; pointer-events:none; }
  #search-results {
    display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:#fff; border:1px solid #eee; border-radius:8px;
    box-shadow:0 4px 16px rgba(0,0,0,0.1); max-height:220px; overflow-y:auto; z-index:9999;
  }
  .search-item { padding:8px 14px; font-size:0.78rem; color:#1B2A5A; cursor:pointer; border-bottom:1px solid #f5f5f5; display:flex; justify-content:space-between; align-items:center; }
  .search-item:hover { background:#f5f7ff; }
  .search-item .si-right { display:flex; align-items:center; gap:6px; }
  .search-item .si-prov { font-size:0.68rem; color:#aaa; }
  .search-item .si-zone { font-size:0.65rem; font-weight:700; color:#fff; padding:2px 7px; border-radius:10px; }
  .search-no-result { padding:10px 14px; font-size:0.76rem; color:#aaa; }

  #filter-bar {
    background:#fff; border-bottom:1px solid #e8e8e8;
    padding:7px 20px; display:flex; align-items:center;
    gap:7px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    white-space:nowrap; scrollbar-width:none;
  }
  #filter-bar::-webkit-scrollbar { display:none; }
  #filter-label { font-size:0.68rem; font-weight:700; color:#aaa; text-transform:uppercase; letter-spacing:0.6px; flex-shrink:0; margin-right:2px; }
  .zone-btn {
    border:2px solid transparent; border-radius:20px;
    padding:5px 13px; font-size:0.72rem; font-weight:600;
    cursor:pointer; color:#fff; outline:none;
    transition:opacity 0.2s; flex-shrink:0; white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  .zone-btn.off { opacity:0.28; }
  .divider-btn { width:1px; height:20px; background:#e0e0e0; flex-shrink:0; margin:0 4px; }
  .util-btn {
    border:1.5px solid #ddd; border-radius:20px;
    padding:5px 12px; font-size:0.72rem; font-weight:600;
    cursor:pointer; color:#555; background:#fff; outline:none;
    flex-shrink:0; white-space:nowrap; -webkit-tap-highlight-color:transparent;
    transition:background 0.15s, color 0.15s;
  }
  .util-btn.active-mode { background:#1B2A5A; color:#fff; border-color:#1B2A5A; }

  #map-wrap { position:relative; height:calc(100vh - 95px); }
  #map { position:absolute; top:0; left:0; right:0; bottom:0; }

  .tdot-popup { font-family:'Segoe UI',Arial,sans-serif; min-width:180px; }
  .tdot-popup .p-city { font-size:0.95rem; font-weight:700; color:#1B2A5A; margin-bottom:1px; }
  .tdot-popup .p-prov { font-size:0.68rem; color:#aaa; margin-bottom:7px; text-transform:uppercase; letter-spacing:0.5px; }
  .tdot-popup .p-zone { display:inline-block; padding:3px 11px; border-radius:20px; font-size:0.72rem; font-weight:700; color:#fff; margin-bottom:4px; }
  .tdot-popup .p-ft { margin-top:7px; background:#fff0f0; border:1px solid #f5b0b0; border-radius:6px; padding:4px 9px; font-size:0.70rem; font-weight:600; color:#CC2027; }
  .tdot-popup .p-temp { margin-top:6px; font-size:0.68rem; color:#aaa; font-style:italic; }

  @media (max-width:480px) {
    #header-title p { display:none; }
    #header-logo { height:36px; }
    #search-input { width:150px; }
    #header-title h1 { font-size:0.88rem; }
    #map-wrap { height:calc(100vh - 100px); }
  }
</style>
</head>

function getZoneColor(z){
  return z<=4 ? COLORS[z] : "#888";
}

function initSearch(){
  var input = document.getElementById("search-input");
  var results = document.getElementById("search-results");

  input.addEventListener("input", function(){
    var q = this.value.toLowerCase().trim();
    results.innerHTML="";
    if (!q || q.length < 2){ results.style.display="none"; return; }

    // Search the full lookup
    var matches = [];
    CITY_LOOKUP.forEach(function(r){
      if (r[0].toLowerCase().indexOf(q) === 0) matches.push(r); // starts with
    });
    if (!matches.length){
      CITY_LOOKUP.forEach(function(r){
        if (r[0].toLowerCase().indexOf(q) !== -1) matches.push(r); // contains
      });
    }
    // dedupe and limit
    var seen = {};
    matches = matches.filter(function(r){
      var k = r[0]+r[1];
      if (seen[k]) return false;
      seen[k]=true; return true;
    }).slice(0,10);

    if (!matches.length){
      results.innerHTML="<div class='search-no-result'>No results found</div>";
      results.style.display="block"; return;
    }

    matches.forEach(function(r){
      var cityName=r[0], prov=r[1], zone=r[2];
      var zoneColor = getZoneColor(zone);
      var zoneText = zone <= 4 ? "Zone "+zone : "Zone 5+";
      var item = document.createElement("div");
      item.className="search-item";
      item.innerHTML =
        "<span>"+cityName+"</span>" +
        "<span class='si-right'>" +
          "<span class='si-prov'>"+prov+"</span>" +
          "<span class='si-zone' style='background:"+zoneColor+"'>"+zoneText+"</span>" +
        "</span>";
      item.onclick = function(){
        results.style.display="none";
        input.value="";
        flyToCity(cityName, prov, zone);
      };
      results.appendChild(item);
    });
    results.style.display="block";
  });

  document.addEventListener("click", function(e){
    if (!document.getElementById("search-wrap").contains(e.target)){
      results.style.display="none";
    }
  });
}

function flyToCity(cityName, prov, zone){
  // Clear previous temp markers
  tempMarkers.forEach(function(m){ map.removeLayer(m); });
  tempMarkers=[];

  // Check if it's already a plotted city
  var key = cityName+","+prov;
  if (markerMap[key]){
    map.setView([markerMap[key].city.lat, markerMap[key].city.lng], 10, {animate:true});
    markerMap[key].marker.openPopup();
    return;
  }

  // Look up coords
  var coords = CITY_COORDS[cityName+","+prov];
  if (!coords){
    // Try prov centroid with jitter
    var c = PROV_CENTERS[prov];
    if (!c) c=[56,-96];
    coords=[c[0]+(Math.random()-0.5)*1.5, c[1]+(Math.random()-0.5)*3];
  }

  var zoneColor = getZoneColor(zone);
  var zoneText  = zone<=4?"Zone "+zone:"Zone 5+ (Quoted)";
  var isZ0 = zone===0;
  var ftBadge = isZ0 ? "<div class='p-ft'>Full-Time Technician Available</div>" : "";

  var marker = L.circleMarker(coords,{
    radius:10, fillColor:zoneColor,
    color:"#fff", weight:2.5, fillOpacity:1, zIndexOffset:1000
  });
  marker.bindPopup(
    "<div class='tdot-popup'>" +
      "<div class='p-city'>"+cityName+"</div>" +
      "<div class='p-prov'>"+prov+"</div>" +
      "<div class='p-zone' style='background:"+zoneColor+"'>"+zoneText+"</div>" +
      ftBadge +
      "<div class='p-temp'>&#128269; Found via city search</div>" +
    "</div>",{maxWidth:240}
  );
  marker.addTo(map);
  tempMarkers.push(marker);
  map.setView(coords, 10, {animate:true});
  marker.openPopup();
}

function toggleZone(z){
  if (citiesOnly) return;
  visible[z]=!visible[z];
  document.getElementById("btn-"+z).classList.toggle("off",!visible[z]);
  if (ringLayers[z]){ visible[z]?map.addLayer(ringLayers[z]):map.removeLayer(ringLayers[z]); }
  if (z<=2&&dotLayers[z]){ visible[z]?map.addLayer(dotLayers[z]):map.removeLayer(dotLayers[z]); }
}

function showAll(){
  citiesOnly=false;
  document.getElementById("btn-cities-only").classList.remove("active-mode");
  for(var z=0;z<=4;z++){
    visible[z]=true;
    var b=document.getElementById("btn-"+z); if(b) b.classList.remove("off");
    if(ringLayers[z]) map.addLayer(ringLayers[z]);
    if(z<=2&&dotLayers[z]) map.addLayer(dotLayers[z]);
  }
}

function hideAll(){
  citiesOnly=false;
  document.getElementById("btn-cities-only").classList.remove("active-mode");
  for(var z=0;z<=4;z++){
    visible[z]=false;
    var b=document.getElementById("btn-"+z); if(b) b.classList.add("off");
    if(ringLayers[z]) map.removeLayer(ringLayers[z]);
    if(z<=2&&dotLayers[z]) map.removeLayer(dotLayers[z]);
  }
}

function toggleCitiesOnly(){
  citiesOnly=!citiesOnly;
  document.getElementById("btn-cities-only").classList.toggle("active-mode",citiesOnly);
  for(var z=0;z<=4;z++){
    var b=document.getElementById("btn-"+z); if(b) b.classList.toggle("off",citiesOnly);
    if(ringLayers[z]){ citiesOnly?map.removeLayer(ringLayers[z]):(visible[z]?map.addLayer(ringLayers[z]):null); }
  }
  for(var z=0;z<=2;z++){
    if(dotLayers[z]){ map.addLayer(dotLayers[z]); }
  }
}

function printMap(){ window.print(); }
</script>
<style>
@media print {
  #filter-bar,#header{ display:none!important; }
  #map-wrap{ height:100vh!important; }
}
</style>
